        "lpSolveAPI (>= 5.5.2.0-17)",
        "Rmosek (>= 9.2.38)",
        "testthat (>= 2.0.0)",
        "data.table (>= 1.12.0)",
        "splines2 (>= 0.2.8)",
        "future.apply (>= 1.6.0)",
        "future (>= 1.18.0)",
        "Matrix",
        "knitr",
        "rmarkdown",
        "pander",
        "AER",
        "lsei",
        "ggplot2",
        "gridExtra"
      ],
      "License": "GPL-2 | GPL-3",
